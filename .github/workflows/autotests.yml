name: Automated tests
on: [push]
jobs:
  x86_64-apple-darwinXX:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - run: make CFLAGS="-march=x86-64" VARIANTS=x86-64-v2,x86-64-v3,logs check
  arm64-apple-darwinXX:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - run: make check
  x86_64-linux-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: make CFLAGS="-march=x86-64" VARIANTS=x86-64-v2,x86-64-v3,logs check
  arm64-linux-gnu:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - run: make check
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v14
      - uses: actions/setup-node@v6
      - run: emmake make OS=wasm check
